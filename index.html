<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#101613">
<title>Paycheck</title>
<style>
  :root{
    --bg:#f0f3ef;
    --card:#ffffff;
    --card2:#f7f9f6;
    --ink:#1c2b24;
    --muted:#65756d;
    --line:#dde4de;
    --rule:#ccd6cf;
    --green:#1e7d4f;
    --green-soft:#e2f2e9;
    --red:#c43c3c;
    --red-soft:#fbe7e7;
    --amber:#a8720f;
    --amber-soft:#fbf0d9;
    --btn:#1c2b24;
    --btn-ink:#f4f7f4;
    --display:ui-rounded,-apple-system,BlinkMacSystemFont,"SF Pro Rounded","Segoe UI",sans-serif;
    --body:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#101613; --card:#1a231d; --card2:#151d18; --ink:#e9efe9; --muted:#94a39a;
      --line:#28332c; --rule:#33413a;
      --green:#4cc98a; --green-soft:#173726; --red:#ff7a70; --red-soft:#3c2020;
      --amber:#e2b25c; --amber-soft:#37301c;
      --btn:#e9efe9; --btn-ink:#131a15;
    }
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:var(--body); font-size:16px; line-height:1.35;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(24px + env(safe-area-inset-bottom)) env(safe-area-inset-left);
  }
  button{font-family:var(--body); cursor:pointer;}
  input,select,textarea{font-family:var(--body); font-size:16px; color:var(--ink);}

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:20;
    background:var(--bg);
    padding:10px 14px 8px;
    display:flex; align-items:center; gap:6px;
    border-bottom:1px solid var(--line);
  }
  .brand{font-family:var(--display); font-weight:700; font-size:17px; letter-spacing:.2px; margin-right:auto;}
  .tab{
    border:0; background:transparent; color:var(--muted);
    font-size:14px; font-weight:600; padding:7px 9px; border-radius:9px;
  }
  .tab.on{color:var(--ink); background:var(--card);}
  .savepill{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:calc(14px + env(safe-area-inset-bottom));
    background:var(--ink); color:var(--bg);
    font-size:12.5px; font-weight:600; padding:6px 12px; border-radius:999px;
    opacity:0; transition:opacity .25s; pointer-events:none; z-index:60;
  }
  .savepill.show{opacity:.92;}
  .warnbanner{
    margin:10px 14px 0; padding:10px 12px; border-radius:12px;
    background:var(--red-soft); color:var(--red); font-size:13.5px; font-weight:600;
  }

  .wrap{padding:12px 14px 0; max-width:560px; margin:0 auto;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:14px; margin-bottom:12px;
  }
  .hint{color:var(--muted); font-size:13.5px;}
  .mono{font-family:var(--mono); font-variant-numeric:tabular-nums;}
  .g{color:var(--green);} .r{color:var(--red);} .a{color:var(--amber);}

  /* ---------- summary ---------- */
  .pc-head{display:flex; align-items:baseline; gap:8px;}
  .pc-label{
    border:0; background:transparent; font-weight:700; font-size:16px;
    padding:2px 0; width:60%; min-width:0;
  }
  .pc-date{color:var(--muted); font-size:13px; margin-left:auto; white-space:nowrap;}
  .bignum{
    font-family:var(--display); font-weight:800; letter-spacing:-.5px;
    font-size:44px; line-height:1.05; margin:8px 0 0;
    font-variant-numeric:tabular-nums;
  }
  .bignum-cap{font-size:12px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); margin-top:10px;}
  .income-row{display:flex; align-items:center; gap:8px; margin-top:10px; font-size:14px; color:var(--muted);}
  .income-row input{
    width:110px; border:1px solid var(--line); border-radius:9px; padding:6px 8px;
    background:var(--card2); font-family:var(--mono); text-align:right;
  }
  .bar{height:8px; border-radius:99px; background:var(--card2); border:1px solid var(--line); overflow:hidden; margin-top:12px;}
  .bar>i{display:block; height:100%; background:var(--green); border-radius:99px;}
  .bar.over>i{background:var(--red);}
  .sumline{display:flex; justify-content:space-between; font-size:13.5px; color:var(--muted); margin-top:7px;}
  .netchip{
    display:inline-flex; gap:6px; align-items:baseline; margin-top:12px;
    background:var(--card2); border:1px solid var(--line); border-radius:10px;
    padding:7px 10px; font-size:13.5px; color:var(--muted); width:100%;
  }
  .netchip b{font-family:var(--mono); font-variant-numeric:tabular-nums; margin-left:auto; font-size:14.5px;}
  .planwarn{margin-top:10px; font-size:13px; color:var(--amber); background:var(--amber-soft); border-radius:9px; padding:7px 10px;}
  .pastbanner{
    margin:10px 14px 0; padding:10px 12px; border-radius:12px;
    background:var(--amber-soft); color:var(--amber); font-size:13.5px; font-weight:600;
    display:flex; align-items:center; gap:8px;
  }
  .pastbanner button{
    margin-left:auto; border:1px solid var(--amber); background:transparent; color:var(--amber);
    border-radius:8px; padding:5px 9px; font-size:13px; font-weight:700;
  }

  /* ---------- sections (the ledger split) ---------- */
  .sec{position:relative; padding-left:14px;}
  .sec::before{
    content:""; position:absolute; left:0; top:12px; bottom:12px; width:4px; border-radius:4px;
    background:var(--rule);
  }
  .sec.ok::before{background:var(--green);}
  .sec.over::before{background:var(--red);}
  .sec-top{display:flex; align-items:center; gap:8px;}
  .flag{
    border:0; background:transparent; font-size:18px; line-height:1;
    color:var(--rule); padding:4px 2px;
  }
  .flag.on{color:var(--amber);}
  .sec-name{
    border:0; background:transparent; font-weight:700; font-size:16px;
    flex:1; min-width:0; padding:2px 0;
  }
  .pri-pill{
    font-size:10.5px; font-weight:800; letter-spacing:.6px; color:var(--amber);
    background:var(--amber-soft); border-radius:6px; padding:3px 6px;
  }
  .xbtn{
    border:0; background:transparent; color:var(--muted); font-size:16px; padding:4px 6px;
  }
  .split{
    display:grid; grid-template-columns:1fr 1px 108px; gap:0 12px; margin-top:10px;
  }
  .split .vr{background:var(--rule); width:1px;}
  .col-cap{font-size:11px; font-weight:800; letter-spacing:.8px; text-transform:uppercase; color:var(--muted);}
  .spent-num{font-family:var(--display); font-weight:800; font-size:22px; margin-top:2px; font-variant-numeric:tabular-nums;}
  .plan-input{
    width:100%; border:1px solid var(--line); border-radius:9px; padding:6px 8px; margin-top:2px;
    background:var(--card2); font-family:var(--mono); text-align:right;
  }
  .plan-left{font-size:12.5px; margin-top:6px; font-weight:600;}
  .exp-list{margin-top:10px;}
  .exp{
    display:flex; align-items:center; gap:8px; padding:7px 0;
    border-top:1px dashed var(--line); font-size:14.5px;
  }
  .exp .nm{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .exp .amt{font-family:var(--mono); font-variant-numeric:tabular-nums;}
  .addrow{display:flex; gap:7px; margin-top:10px;}
  .addrow input[data-role=nm]{flex:1; min-width:0;}
  .addrow input{
    border:1px solid var(--line); border-radius:9px; padding:8px 9px; background:var(--card2);
  }
  .addrow input[data-role=amt]{width:84px; font-family:var(--mono); text-align:right;}
  .addrow .go{
    border:0; background:var(--btn); color:var(--btn-ink); border-radius:9px;
    width:40px; font-size:19px; font-weight:700; flex:none;
  }
  .secbar{height:5px; border-radius:99px; background:var(--card2); border:1px solid var(--line); overflow:hidden; margin-top:10px;}
  .secbar>i{display:block; height:100%; background:var(--green);}
  .secbar.over>i{background:var(--red);}

  .bigbtn{
    width:100%; border:1.5px dashed var(--rule); background:transparent; color:var(--muted);
    border-radius:14px; padding:13px; font-size:15px; font-weight:700; margin-bottom:12px;
  }
  .solidbtn{
    width:100%; border:0; background:var(--btn); color:var(--btn-ink);
    border-radius:12px; padding:13px; font-size:15px; font-weight:700;
  }

  /* ---------- history / debts ---------- */
  .rowcard{display:flex; align-items:center; gap:10px;}
  .rowcard .info{flex:1; min-width:0;}
  .rowcard .ttl{font-weight:700; display:flex; align-items:center; gap:7px;}
  .rowcard .sub{color:var(--muted); font-size:13px; margin-top:3px;}
  .rowcard .leftnum{font-family:var(--mono); font-weight:700; font-size:16px; font-variant-numeric:tabular-nums; text-align:right;}
  .cur-pill{font-size:10.5px; font-weight:800; letter-spacing:.5px; color:var(--green); background:var(--green-soft); padding:3px 6px; border-radius:6px;}
  .linkbtn{border:0; background:transparent; color:var(--muted); font-size:13.5px; font-weight:600; padding:6px 4px;}
  .debt-bal{font-family:var(--mono); font-weight:700; font-variant-numeric:tabular-nums;}
  select{
    border:1px solid var(--line); border-radius:9px; padding:8px 6px; background:var(--card2);
    flex:1; min-width:0;
  }
  h2{font-family:var(--display); font-size:20px; margin:6px 2px 12px;}

  /* ---------- modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(10,14,11,.5); z-index:50;
    display:none; align-items:flex-end; justify-content:center;
  }
  .overlay.show{display:flex;}
  .sheet{
    background:var(--card); width:100%; max-width:560px;
    border-radius:20px 20px 0 0; padding:18px 16px calc(18px + env(safe-area-inset-bottom));
    max-height:85vh; overflow:auto;
  }
  .sheet h3{margin:0 0 12px; font-family:var(--display); font-size:19px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12.5px; font-weight:700; color:var(--muted); margin-bottom:5px;}
  .field input[type=text],.field input[type=date],.field textarea{
    width:100%; border:1px solid var(--line); border-radius:10px; padding:10px; background:var(--card2);
  }
  .field textarea{font-family:var(--mono); font-size:12px; min-height:110px;}
  .chk{display:flex; gap:9px; align-items:flex-start; font-size:14px; margin:14px 0;}
  .chk input{width:19px; height:19px; margin-top:1px;}
  .sheet .row2{display:flex; gap:10px; margin-top:6px;}
  .ghostbtn{
    flex:1; border:1px solid var(--line); background:transparent; color:var(--ink);
    border-radius:12px; padding:12px; font-size:15px; font-weight:700;
  }
  .dangerbtn{background:var(--red); color:#fff; border:0;}
  .sheet .solidbtn{flex:1;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<div id="app"></div>
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="savepill" id="savepill">Saved</div>

<script>
"use strict";

/* ================= storage ================= */
const KEY = "paycheck-budget-v1";
let state = null;
let storageMode = "memory";   // cloud (Claude account) | device (this phone/browser) | memory
let saveTimer = null;
let saveFailed = false;

function safeParse(raw){ try{ return JSON.parse(raw); }catch(e){ return null; } }

async function loadState(){
  /* 1) Claude cloud storage — available when opened on claude.ai */
  if (window.storage){
    try{
      const res = await window.storage.get(KEY);
      storageMode = "cloud";
      return (res && res.value) ? safeParse(res.value) : null;
    }catch(e){
      /* key probably doesn't exist yet — verify writes work */
      try{ await window.storage.set(KEY+"-ping","1"); storageMode = "cloud"; return null; }
      catch(e2){ /* cloud unusable — fall through to device */ }
    }
  }
  /* 2) device storage — used when hosted anywhere else (saves on this phone/browser) */
  try{
    const t = "__pb_probe__";
    localStorage.setItem(t,"1"); localStorage.removeItem(t);
    storageMode = "device";
    const raw = localStorage.getItem(KEY);
    return raw ? safeParse(raw) : null;
  }catch(e){ /* private mode or blocked */ }
  storageMode = "memory";
  return null;
}
function queueSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 450);
}
async function doSave(){
  if (storageMode === "memory") return;
  if (storageMode === "cloud"){
    try{
      const res = await window.storage.set(KEY, JSON.stringify(state));
      saveFailed = !res;
    }catch(e){ saveFailed = true; }
  } else {
    try{ localStorage.setItem(KEY, JSON.stringify(state)); saveFailed = false; }
    catch(e){ saveFailed = true; }
  }
  const pill = document.getElementById("savepill");
  if (!saveFailed){
    pill.textContent = "Saved";
    pill.classList.add("show");
    setTimeout(()=>pill.classList.remove("show"), 900);
  } else {
    render(); // shows the warning banner
  }
}

/* ================= helpers ================= */
const $ = (s,el=document)=>el.querySelector(s);
const uid = ()=> (crypto.randomUUID ? crypto.randomUUID() : Date.now()+"-"+Math.random().toString(16).slice(2));
const esc = s => String(s ?? "").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtFull = new Intl.NumberFormat("en-GB",{style:"currency",currency:"GBP"});
const fmtWhole = new Intl.NumberFormat("en-GB",{style:"currency",currency:"GBP",maximumFractionDigits:0});
function money(n){ return fmtFull.format(n||0); }
function moneyBig(n){ n=n||0; return Number.isInteger(n) ? fmtWhole.format(n) : fmtFull.format(n); }
function parseMoney(str){
  const n = parseFloat(String(str).replace(/[^0-9.\-]/g,""));
  return isNaN(n) ? null : Math.round(n*100)/100;
}
function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function niceDate(iso){
  const d = new Date(iso+"T12:00:00");
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
}

/* ================= state ================= */
function freshPaycheck(label){
  return { id:uid(), label:label, date:todayISO(), income:0,
           created:Date.now(), sections:[], debtPayments:[] };
}
function defaultState(){
  const p = freshPaycheck("Paycheck 1");
  return { v:1, currentId:p.id, viewingId:p.id, view:"home", debts:[], paychecks:[p] };
}
function pc(id){ return state.paychecks.find(p=>p.id===id); }
function viewingPc(){ return pc(state.viewingId) || pc(state.currentId); }
function secSpent(s){ return s.expenses.reduce((t,e)=>t+e.amount,0); }
function pcSpent(p){
  return p.sections.reduce((t,s)=>t+secSpent(s),0) +
         p.debtPayments.reduce((t,d)=>t+d.amount,0);
}
function pcLeft(p){ return (p.income||0) - pcSpent(p); }
function pcPlanned(p){ return p.sections.reduce((t,s)=>t+(s.planned||0),0); }
function allTimeNet(){ return state.paychecks.reduce((t,p)=>t+pcLeft(p),0); }
function debtPaid(debtId){
  return state.paychecks.reduce((t,p)=>
    t + p.debtPayments.filter(d=>d.debtId===debtId).reduce((a,b)=>a+b.amount,0), 0);
}
function debtBalance(d){ return Math.round(((d.start||0) - debtPaid(d.id))*100)/100; }
function commit(){ render(); queueSave(); }

/* ================= views ================= */
function render(){
  const app = $("#app");
  let html = topbar();
  if (saveFailed) html += `<div class="warnbanner">Couldn't save your last change. Check your connection — and use Backup to copy your data, just in case.</div>`;
  if (storageMode==="memory") html += `<div class="warnbanner">Storage isn't available here, so changes won't survive closing the page. Use Backup to copy your data out.</div>`;
  if (state.view==="home") html += homeView();
  else if (state.view==="history") html += historyView();
  else if (state.view==="debts") html += debtsView();
  app.innerHTML = html;
}

function topbar(){
  const t = v => state.view===v ? "tab on" : "tab";
  return `<div class="topbar">
    <span class="brand">Paycheck</span>
    <button class="${t("home")}" data-act="nav" data-v="home">Budget</button>
    <button class="${t("history")}" data-act="nav" data-v="history">Paychecks</button>
    <button class="${t("debts")}" data-act="nav" data-v="debts">Debts</button>
    <button class="tab" data-act="backup">Backup</button>
  </div>`;
}

/* ---------- home ---------- */
function homeView(){
  const p = viewingPc();
  const spent = pcSpent(p), left = pcLeft(p), planned = pcPlanned(p);
  const over = left < 0;
  const started = (p.income||0) > 0 || spent > 0;
  const pct = p.income>0 ? Math.min(spent/p.income*100,100) : (spent>0?100:0);
  const net = allTimeNet();

  let html = "";
  if (p.id !== state.currentId){
    html += `<div class="pastbanner">Viewing a past paycheck
      <button data-act="backcur">Back to current</button></div>`;
  }
  html += `<div class="wrap">`;

  /* summary */
  html += `<div class="card">
    <div class="pc-head">
      <input class="pc-label" value="${esc(p.label)}" data-field="pclabel" aria-label="Paycheck name">
      <span class="pc-date">${niceDate(p.date)}</span>
    </div>
    <div class="bignum-cap">Left this paycheck</div>
    <div class="bignum ${started ? (over?"r":"g") : ""}">${moneyBig(left)}</div>
    <div class="income-row">
      <span>Paycheck amount</span>
      <input inputmode="decimal" value="${p.income ? p.income : ""}" placeholder="0.00" data-field="income" aria-label="Paycheck amount">
    </div>
    <div class="bar ${over?"over":""}"><i style="width:${pct}%"></i></div>
    <div class="sumline"><span>Spent ${money(spent)}</span><span>of ${money(p.income||0)}</span></div>
    ${planned > (p.income||0) && p.income>0 ? `<div class="planwarn">Your plans add up to ${money(planned - p.income)} more than this paycheck.</div>` : ""}
    <div class="netchip"><span>All-time net (leftovers from every paycheck)</span><b class="${net<0?"r":"g"}">${money(net)}</b></div>
  </div>`;

  /* sections */
  if (p.sections.length === 0){
    html += `<div class="card hint">No sections yet. Add whatever fits your life — Rent, Groceries, Gas, Fun. Each one gets a plan on the right and real spending on the left.</div>`;
  }
  for (const s of p.sections) html += sectionCard(s);

  html += `<div class="card">
    <div class="col-cap">New section</div>
    <div class="addrow">
      <input data-role="nm" data-newsec="1" placeholder="Section name" aria-label="New section name">
      <button class="go" data-act="addsec" aria-label="Add section">+</button>
    </div>
  </div>`;

  /* debt payments */
  html += debtCard(p);
  html += `</div>`;
  return html;
}

function sectionCard(s){
  const spent = secSpent(s);
  const hasPlan = (s.planned||0) > 0;
  const overPlan = hasPlan && spent > s.planned;
  const cls = hasPlan ? (overPlan ? "over" : "ok") : (spent>0 ? "ok" : "");
  const planLeft = (s.planned||0) - spent;
  const pct = hasPlan ? Math.min(spent/s.planned*100,100) : 0;

  let rows = "";
  for (const e of s.expenses){
    rows += `<div class="exp">
      <span class="nm">${esc(e.name)}</span>
      <span class="amt">${money(e.amount)}</span>
      <button class="xbtn" data-act="delexp" data-sec="${s.id}" data-exp="${e.id}" aria-label="Delete expense">✕</button>
    </div>`;
  }

  return `<div class="card sec ${cls}">
    <div class="sec-top">
      <button class="flag ${s.priority?"on":""}" data-act="flag" data-sec="${s.id}" aria-label="Toggle high priority">${s.priority?"⚑":"⚐"}</button>
      <input class="sec-name" value="${esc(s.name)}" data-field="secname" data-sec="${s.id}" aria-label="Section name">
      ${s.priority ? `<span class="pri-pill">HIGH</span>` : ""}
      <button class="xbtn" data-act="delsec" data-sec="${s.id}" aria-label="Delete section">✕</button>
    </div>
    <div class="split">
      <div>
        <div class="col-cap">Spent</div>
        <div class="spent-num ${hasPlan ? (overPlan?"r":"g") : ""}">${moneyBig(spent)}</div>
      </div>
      <div class="vr"></div>
      <div>
        <div class="col-cap">Plan</div>
        <input class="plan-input" inputmode="decimal" value="${s.planned ? s.planned : ""}" placeholder="0.00" data-field="planned" data-sec="${s.id}" aria-label="Planned amount">
        ${hasPlan ? `<div class="plan-left ${overPlan?"r":"g"}">${overPlan ? money(-planLeft)+" over" : money(planLeft)+" left"}</div>` : ""}
      </div>
    </div>
    ${hasPlan ? `<div class="secbar ${overPlan?"over":""}"><i style="width:${pct}%"></i></div>` : ""}
    <div class="exp-list">${rows}</div>
    <div class="addrow">
      <input data-role="nm" data-sec="${s.id}" placeholder="What was it?" aria-label="Expense name">
      <input data-role="amt" data-sec="${s.id}" inputmode="decimal" placeholder="0.00" aria-label="Expense amount">
      <button class="go" data-act="addexp" data-sec="${s.id}" aria-label="Add expense">+</button>
    </div>
  </div>`;
}

function debtCard(p){
  const total = p.debtPayments.reduce((t,d)=>t+d.amount,0);
  let rows = "";
  for (const d of p.debtPayments){
    rows += `<div class="exp">
      <span class="nm">${esc(d.debtName)}</span>
      <span class="amt">${money(d.amount)}</span>
      <button class="xbtn" data-act="delpay" data-pay="${d.id}" aria-label="Delete payment">✕</button>
    </div>`;
  }
  let addUI;
  if (state.debts.length === 0){
    addUI = `<div class="hint" style="margin-top:10px">No debts set up yet — add them in the <b>Debts</b> tab, then log payments here. Payments come out of this paycheck.</div>`;
  } else {
    let opts = state.debts.map(d=>`<option value="${d.id}">${esc(d.name)} — ${money(debtBalance(d))} left</option>`).join("");
    addUI = `<div class="addrow">
      <select id="paydebt" aria-label="Which debt">${opts}</select>
      <input data-role="amt" id="payamt" inputmode="decimal" placeholder="0.00" aria-label="Payment amount">
      <button class="go" data-act="addpay" aria-label="Add payment">+</button>
    </div>`;
  }
  return `<div class="card sec ${total>0?"ok":""}">
    <div class="sec-top">
      <span style="font-size:18px">⛓</span>
      <span class="sec-name" style="pointer-events:none">Debt payments</span>
    </div>
    <div class="split">
      <div>
        <div class="col-cap">Paid this paycheck</div>
        <div class="spent-num">${moneyBig(total)}</div>
      </div>
      <div class="vr"></div>
      <div>
        <div class="col-cap">Owed overall</div>
        <div class="spent-num" style="font-size:17px; margin-top:6px">${moneyBig(state.debts.reduce((t,d)=>t+Math.max(debtBalance(d),0),0))}</div>
      </div>
    </div>
    <div class="exp-list">${rows}</div>
    ${addUI}
  </div>`;
}

/* ---------- history ---------- */
function historyView(){
  let html = `<div class="wrap"><h2>Paychecks</h2>
    <button class="solidbtn" data-act="newpcmodal" style="margin-bottom:12px">Start a new paycheck</button>`;
  const list = [...state.paychecks].sort((a,b)=>b.created-a.created);
  for (const p of list){
    const left = pcLeft(p);
    html += `<div class="card rowcard">
      <div class="info">
        <div class="ttl">${esc(p.label)} ${p.id===state.currentId?`<span class="cur-pill">CURRENT</span>`:""}</div>
        <div class="sub">${niceDate(p.date)} · in ${money(p.income||0)} · spent ${money(pcSpent(p))}</div>
        <button class="linkbtn" data-act="delpc" data-pc="${p.id}">Delete</button>
      </div>
      <div>
        <div class="leftnum ${left<0?"r":"g"}">${money(left)}</div>
        <button class="linkbtn" data-act="openpc" data-pc="${p.id}" style="float:right">Open →</button>
      </div>
    </div>`;
  }
  const net = allTimeNet();
  html += `<div class="card netchip" style="margin-top:4px"><span>All-time net across ${state.paychecks.length} paycheck${state.paychecks.length===1?"":"s"}</span><b class="${net<0?"r":"g"}">${money(net)}</b></div>`;
  html += `</div>`;
  return html;
}

/* ---------- debts ---------- */
function debtsView(){
  let html = `<div class="wrap"><h2>Debts</h2>`;
  if (state.debts.length===0){
    html += `<div class="card hint">Nothing here yet. Add each debt with what you currently owe. When you log a payment on the Budget tab, the balance drops and the money comes out of that paycheck.</div>`;
  }
  for (const d of state.debts){
    const bal = debtBalance(d);
    const paid = debtPaid(d.id);
    const pct = d.start>0 ? Math.min(paid/d.start*100,100) : 0;
    html += `<div class="card">
      <div class="rowcard">
        <div class="info">
          <div class="ttl">${esc(d.name)} ${bal<=0?`<span class="cur-pill">PAID OFF 🎉</span>`:""}</div>
          <div class="sub">started at ${money(d.start)} · paid ${money(paid)}</div>
        </div>
        <div class="debt-bal ${bal<=0?"g":""}">${money(Math.max(bal,0))}</div>
        <button class="xbtn" data-act="deldebt" data-debt="${d.id}" aria-label="Delete debt">✕</button>
      </div>
      <div class="secbar" style="margin-top:10px"><i style="width:${pct}%"></i></div>
    </div>`;
  }
  html += `<div class="card">
    <div class="col-cap">New debt</div>
    <div class="addrow">
      <input data-role="nm" id="debtnm" placeholder="Name (Visa, car loan…)" aria-label="Debt name">
      <input data-role="amt" id="debtamt" inputmode="decimal" placeholder="Owed" aria-label="Amount owed">
      <button class="go" data-act="adddebt" aria-label="Add debt">+</button>
    </div>
  </div></div>`;
  return html;
}

/* ================= modal ================= */
let confirmFn = null;
function openSheet(html){ $("#sheet").innerHTML = html; $("#overlay").classList.add("show"); }
function closeSheet(){ $("#overlay").classList.remove("show"); confirmFn = null; }

function openConfirm(title, body, yesLabel, fn){
  confirmFn = fn;
  openSheet(`<h3>${esc(title)}</h3>
    <p class="hint" style="margin:0 0 16px">${esc(body)}</p>
    <div class="row2">
      <button class="ghostbtn" data-act="sheetclose">Cancel</button>
      <button class="solidbtn dangerbtn" data-act="confirmyes">${esc(yesLabel)}</button>
    </div>`);
}

function openNewPaycheck(){
  const n = state.paychecks.length + 1;
  const d = new Date();
  const defLabel = `Paycheck ${n} — ${d.toLocaleDateString("en-GB",{day:"numeric",month:"short"})}`;
  openSheet(`<h3>New paycheck</h3>
    <div class="field"><label>Name</label><input type="text" id="np-label" value="${esc(defLabel)}"></div>
    <div class="field"><label>Amount</label><input type="text" inputmode="decimal" id="np-income" placeholder="0.00"></div>
    <div class="field"><label>Date</label><input type="date" id="np-date" value="${todayISO()}"></div>
    <label class="chk"><input type="checkbox" id="np-copy" checked>
      <span>Copy sections &amp; plans from the current paycheck (spending starts at zero)</span></label>
    <p class="hint" style="margin:0 0 14px">Money starts fresh — whatever's left over from the old paycheck lives on in your all-time net.</p>
    <div class="row2">
      <button class="ghostbtn" data-act="sheetclose">Cancel</button>
      <button class="solidbtn" data-act="createpc">Start paycheck</button>
    </div>`);
}

function openBackup(){
  const json = JSON.stringify(state, null, 1);
  openSheet(`<h3>Backup &amp; restore</h3>
    <div class="field"><label>Your data — tap Copy and save it somewhere safe (Notes works great)</label>
      <textarea id="bk-out" readonly>${esc(json)}</textarea></div>
    <div class="row2" style="margin-bottom:18px">
      <button class="ghostbtn" data-act="copybackup" id="copybtn">Copy</button>
    </div>
    <div class="field"><label>Restore: paste a backup here</label>
      <textarea id="bk-in" placeholder='{"v":1, ...}'></textarea></div>
    <div class="row2">
      <button class="ghostbtn" data-act="sheetclose">Close</button>
      <button class="solidbtn dangerbtn" data-act="importbackup">Replace my data</button>
    </div>`);
}

/* ================= actions ================= */
document.addEventListener("click", ev=>{
  const btn = ev.target.closest("[data-act]");
  if (!btn) return;
  const act = btn.dataset.act;
  const p = viewingPc();

  if (act==="nav"){ state.view = btn.dataset.v; if (btn.dataset.v==="home") state.viewingId = state.viewingId || state.currentId; commit(); }

  else if (act==="backcur"){ state.viewingId = state.currentId; commit(); }

  else if (act==="flag"){ const s = p.sections.find(x=>x.id===btn.dataset.sec); if(s){ s.priority = !s.priority; commit(); } }

  else if (act==="addsec"){
    const inp = $('input[data-newsec]');
    const name = inp.value.trim();
    if (!name) { inp.focus(); return; }
    p.sections.push({id:uid(), name, planned:0, priority:false, expenses:[]});
    commit();
  }

  else if (act==="delsec"){
    const s = p.sections.find(x=>x.id===btn.dataset.sec);
    openConfirm("Delete section?", `“${s.name}” and its ${s.expenses.length} expense${s.expenses.length===1?"":"s"} will be removed from this paycheck.`, "Delete", ()=>{
      p.sections = p.sections.filter(x=>x.id!==s.id); commit();
    });
  }

  else if (act==="addexp"){
    const sid = btn.dataset.sec;
    const s = p.sections.find(x=>x.id===sid);
    const nm = $(`input[data-role=nm][data-sec="${sid}"]`);
    const am = $(`input[data-role=amt][data-sec="${sid}"]`);
    const amount = parseMoney(am.value);
    if (amount===null || amount<=0){ am.focus(); return; }
    s.expenses.push({id:uid(), name:(nm.value.trim()||"Expense"), amount});
    commit();
  }

  else if (act==="delexp"){
    const s = p.sections.find(x=>x.id===btn.dataset.sec);
    if (s){ s.expenses = s.expenses.filter(e=>e.id!==btn.dataset.exp); commit(); }
  }

  else if (act==="addpay"){
    const sel = $("#paydebt"), am = $("#payamt");
    const debt = state.debts.find(d=>d.id===sel.value);
    const amount = parseMoney(am.value);
    if (!debt || amount===null || amount<=0){ am.focus(); return; }
    p.debtPayments.push({id:uid(), debtId:debt.id, debtName:debt.name, amount});
    commit();
  }

  else if (act==="delpay"){ p.debtPayments = p.debtPayments.filter(d=>d.id!==btn.dataset.pay); commit(); }

  else if (act==="adddebt"){
    const nm = $("#debtnm"), am = $("#debtamt");
    const start = parseMoney(am.value);
    if (!nm.value.trim() || start===null || start<=0){ (nm.value.trim()?am:nm).focus(); return; }
    state.debts.push({id:uid(), name:nm.value.trim(), start});
    commit();
  }

  else if (act==="deldebt"){
    const d = state.debts.find(x=>x.id===btn.dataset.debt);
    openConfirm("Remove debt?", `“${d.name}” will be removed. Payments you already logged stay in your paycheck history.`, "Remove", ()=>{
      state.debts = state.debts.filter(x=>x.id!==d.id); commit();
    });
  }

  else if (act==="newpcmodal"){ openNewPaycheck(); }

  else if (act==="createpc"){
    const label = $("#np-label").value.trim() || `Paycheck ${state.paychecks.length+1}`;
    const income = parseMoney($("#np-income").value) || 0;
    const date = $("#np-date").value || todayISO();
    const copy = $("#np-copy").checked;
    const np = freshPaycheck(label);
    np.income = income; np.date = date;
    if (copy){
      const cur = pc(state.currentId);
      if (cur) np.sections = cur.sections.map(s=>({id:uid(), name:s.name, planned:s.planned, priority:s.priority, expenses:[]}));
    }
    state.paychecks.push(np);
    state.currentId = np.id;
    state.viewingId = np.id;
    state.view = "home";
    closeSheet(); commit();
  }

  else if (act==="openpc"){ state.viewingId = btn.dataset.pc; state.view = "home"; commit(); }

  else if (act==="delpc"){
    const target = pc(btn.dataset.pc);
    openConfirm("Delete paycheck?", `“${target.label}” and everything logged in it will be gone. Debt balances will adjust to remove its payments.`, "Delete", ()=>{
      state.paychecks = state.paychecks.filter(x=>x.id!==target.id);
      if (state.paychecks.length===0) state.paychecks.push(freshPaycheck("Paycheck 1"));
      const newest = [...state.paychecks].sort((a,b)=>b.created-a.created)[0];
      if (state.currentId===target.id) state.currentId = newest.id;
      if (state.viewingId===target.id) state.viewingId = state.currentId;
      commit();
    });
  }

  else if (act==="backup"){ openBackup(); }

  else if (act==="copybackup"){
    const ta = $("#bk-out");
    ta.select(); ta.setSelectionRange(0, ta.value.length);
    const done = ()=>{ $("#copybtn").textContent = "Copied ✓"; };
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(ta.value).then(done).catch(()=>{ try{document.execCommand("copy"); done();}catch(e){} });
    } else { try{document.execCommand("copy"); done();}catch(e){} }
  }

  else if (act==="importbackup"){
    let data;
    try{ data = JSON.parse($("#bk-in").value); }catch(e){ $("#bk-in").style.borderColor = "var(--red)"; return; }
    if (!data || !Array.isArray(data.paychecks)){ $("#bk-in").style.borderColor = "var(--red)"; return; }
    openConfirm("Replace everything?", "Your current data will be overwritten with the pasted backup.", "Replace", ()=>{
      state = data;
      if (!pc(state.currentId)) state.currentId = state.paychecks[0].id;
      state.viewingId = state.currentId;
      state.view = "home";
      commit();
    });
  }

  else if (act==="sheetclose"){ closeSheet(); }
  else if (act==="confirmyes"){ const fn = confirmFn; closeSheet(); if (fn) fn(); }
});

/* close sheet by tapping the dimmed background */
$("#overlay").addEventListener("click", ev=>{ if (ev.target.id==="overlay") closeSheet(); });

/* committed edits (fire on blur / done) */
document.addEventListener("change", ev=>{
  const el = ev.target;
  const field = el.dataset && el.dataset.field;
  if (!field) return;
  const p = viewingPc();
  if (field==="income"){ p.income = parseMoney(el.value) ?? 0; commit(); }
  else if (field==="pclabel"){ p.label = el.value.trim() || p.label; commit(); }
  else if (field==="planned"){
    const s = p.sections.find(x=>x.id===el.dataset.sec);
    if (s){ s.planned = parseMoney(el.value) ?? 0; commit(); }
  }
  else if (field==="secname"){
    const s = p.sections.find(x=>x.id===el.dataset.sec);
    if (s){ s.name = el.value.trim() || s.name; commit(); }
  }
});

/* Enter key = add, in any add-row amount/name input */
document.addEventListener("keydown", ev=>{
  if (ev.key!=="Enter") return;
  const el = ev.target;
  if (!el.dataset) return;
  if (el.dataset.newsec){ ev.preventDefault(); $('button[data-act=addsec]').click(); }
  else if (el.dataset.role==="amt" && el.dataset.sec){ ev.preventDefault(); $(`button[data-act=addexp][data-sec="${el.dataset.sec}"]`).click(); }
  else if (el.id==="payamt"){ ev.preventDefault(); $('button[data-act=addpay]').click(); }
  else if (el.id==="debtamt"){ ev.preventDefault(); $('button[data-act=adddebt]').click(); }
});

/* ================= boot ================= */
(async function init(){
  $("#app").innerHTML = `<div class="wrap hint" style="padding-top:40vh; text-align:center">Loading…</div>`;
  const saved = await loadState();
  state = saved || defaultState();
  if (!state.view) state.view = "home";
  if (!pc(state.viewingId)) state.viewingId = state.currentId;
  render();
})();
</script>
</body>
</html>
